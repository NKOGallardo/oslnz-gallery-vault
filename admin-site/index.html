<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>OSLNZ Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --black: #1a1816;
        --white: #ffffff;
        --cream: #faf8f5;
        --pine: #234f3d;
        --brown: #7a5230;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: var(--cream); color: var(--black); font-family: "Inter", system-ui, sans-serif; min-height: 100vh; }
      main { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
      .card { width: 100%; max-width: 420px; background: var(--white); border: 1px solid rgba(0,0,0,0.08); border-radius: 16px; padding: 32px; box-shadow: 0 20px 40px -20px rgba(0,0,0,0.08); }
      h1 { font-family: "Cormorant Garamond", serif; font-size: 30px; margin: 0 0 4px; letter-spacing: -0.01em; font-weight: 600; }
      p.sub { margin: 0 0 24px; color: rgba(0,0,0,0.55); font-size: 14px; }
      label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(0,0,0,0.55); margin-bottom: 8px; }
      input { width: 100%; background: var(--cream); color: var(--black); border: 1px solid rgba(0,0,0,0.12); border-radius: 10px; padding: 14px 16px; font-size: 16px; font-family: inherit; outline: none; }
      input:focus { border-color: var(--pine); }
      button { width: 100%; margin-top: 16px; background: var(--pine); color: var(--white); border: 0; border-radius: 10px; padding: 14px 16px; font-size: 15px; font-weight: 600; font-family: "Cormorant Garamond", serif; letter-spacing: 0.04em; cursor: pointer; transition: background 0.15s; }
      button:hover:not(:disabled) { background: #2c6249; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .row { display: flex; gap: 8px; align-items: center; margin-top: 20px; font-size: 13px; color: rgba(0,0,0,0.5); }
      .row input[type="text"] { flex: 1; padding: 10px 12px; font-size: 13px; }
      .msg { margin-top: 14px; font-size: 13px; padding: 10px 12px; border-radius: 8px; }
      .msg.err { background: rgba(220, 38, 38, 0.08); color: #991b1b; border: 1px solid rgba(220,38,38,0.25); }
      .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; }
      .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--pine); }
      .brand span { font-family: "Cormorant Garamond", serif; font-weight: 700; letter-spacing: 0.2em; font-size: 13px; }
      footer { text-align: center; margin-top: 24px; font-size: 12px; color: rgba(0,0,0,0.4); }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <div class="brand"><span class="dot"></span><span>OSLNZ · ADMIN</span></div>
        <h1>Sign in</h1>
        <p class="sub">Enter your admin code to open the dashboard.</p>

        <form id="f">
          <label for="code">Admin code</label>
          <input id="code" name="code" type="password" autocomplete="off" required placeholder="•••••" />

          <details style="margin-top:14px;">
            <summary style="cursor:pointer;font-size:12px;color:rgba(255,255,255,0.5);">API endpoint</summary>
            <div class="row">
              <input id="api" type="text" placeholder="https://your-app.lovable.app" />
            </div>
          </details>

          <button id="btn" type="submit">Open dashboard</button>
          <div id="msg"></div>
        </form>
        <footer>Private access · Do not share this URL</footer>
      </div>
    </main>

    <script>
      const DEFAULT_API = "https://oslnz.lovable.app";
      const apiInput = document.getElementById("api");
      apiInput.value = localStorage.getItem("oslnz_api") || DEFAULT_API;

      document.getElementById("f").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("btn");
        const msg = document.getElementById("msg");
        msg.className = ""; msg.textContent = "";
        const code = document.getElementById("code").value.trim();
        const api = (apiInput.value || DEFAULT_API).replace(/\/$/, "");
        localStorage.setItem("oslnz_api", api);
        btn.disabled = true; btn.textContent = "Verifying…";
        try {
          const res = await fetch(api + "/api/public/admin/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ code }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || !data.ok) {
            msg.className = "msg err";
            msg.textContent = data.error || "Login failed";
            btn.disabled = false; btn.textContent = "Open dashboard";
            return;
          }
          window.location.href = data.dashboardUrl;
        } catch (err) {
          msg.className = "msg err";
          msg.textContent = "Network error — check the API endpoint.";
          btn.disabled = false; btn.textContent = "Open dashboard";
        }
      });
    </script>
  </body>
</html>
